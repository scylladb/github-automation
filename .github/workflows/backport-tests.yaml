name: Backport Unit Tests

on:
  pull_request:
    paths:
      - '.github/scripts/auto-backport-jira.py'
      - '.github/tests/**'
      - '.github/workflows/backport-tests.yaml'
      - '.github/workflows/backport-with-jira.yaml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r .github/tests/requirements-test.txt

      - name: Run unit tests
        run: |
          pytest .github/tests/ -v --tb=short \
            --junitxml=test-results.xml \
            --cov=.github/scripts \
            --cov-report=term-missing
        env:
          GITHUB_TOKEN: fake-token-for-tests
          JIRA_AUTH: "testuser:testtoken"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml
