name: Backport Unit Tests

on:
  pull_request:
    paths:
      - '.github/scripts/auto-backport-jira.py'
      - '.github/tests/**'
      - '.github/workflows/backport-tests.yaml'
      - '.github/workflows/backport-with-jira.yaml'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r .github/tests/requirements-test.txt

      - name: Run unit tests
        run: |
          pytest .github/tests/ -v --tb=short \
            --junitxml=test-results.xml \
            --cov=.github/scripts \
            --cov-report=term-missing
        env:
          GITHUB_TOKEN: fake-token-for-tests
          JIRA_AUTH: "testuser:testtoken"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: test-results
          path: test-results.xml
