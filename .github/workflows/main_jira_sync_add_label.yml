name: Sync With Jira - Add Label

on:
  workflow_call:
    secrets:
      caller_jira_auth:
        required: true

jobs:
  manage_labeled_gh_event:
    runs-on: ubuntu-slim
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: scylladb/github-automation
          ref: main

      - name: Run label-sync orchestrator
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          TRIGGERING_LABEL: ${{ github.event.label.name }}
          OWNER_REPO: ${{ github.repository }}
          GITHUB_TOKEN: ${{ github.token }}
          JIRA_AUTH: ${{ secrets.caller_jira_auth }}
        run: python3 scripts/jira_sync_logic.py --action manage_labeled_gh_event
