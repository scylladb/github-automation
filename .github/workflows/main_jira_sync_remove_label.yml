name: Sync With Jira - Remove Label

on:
  workflow_call:
    secrets:
      caller_jira_auth:
        required: true

jobs:
  sync:
    name: Remove-label orchestration
    runs-on: ubuntu-slim
    steps:
      - name: Checkout scripts
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: scylladb/github-automation
          ref: main
          path: _automation

      - name: Run manage_unlabeled_gh_event
        env:
          PR_TITLE:      ${{ github.event.pull_request.title }}
          PR_BODY:       ${{ github.event.pull_request.body }}
          PR_NUMBER:     ${{ github.event.pull_request.number }}
          REMOVED_LABEL: ${{ github.event.label.name }}
          OWNER_REPO:    ${{ github.repository }}
          GITHUB_TOKEN:  ${{ secrets.GITHUB_TOKEN }}
          JIRA_AUTH:     ${{ secrets.caller_jira_auth }}
        run: |
          cd _automation/scripts
          python jira_sync_logic.py --action manage_unlabeled_gh_event
